<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Spec 01 · 지갑 자동 발견 프로토타입</title>
<meta name="viewport" content="width=1400, user-scalable=no">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/wanteddev/wanted-sans@v1.0.3/packages/wanted-sans/fonts/webfonts/variable/split/WantedSansVariable.min.css">
<link rel="stylesheet" href="app.css">
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="Primitives.jsx"></script>
<script type="text/babel" src="Screens.jsx"></script>
<script type="text/babel" src="LockScreen.jsx"></script>

<script type="text/babel" data-presets="react">
// useState/useEffect/useMemo declared in Screens.jsx (loaded above)

// ─────────── Scenes 정의 (좌측 네비게이션 용) ───────────
const SCENES = [
  {
    id: 'lockscreen',
    group: '🔒 감지 & 알림',
    label: '잠금화면 + Live Activity',
    hint: '반경 진입 시 표시',
    desc: '민지가 주머니에서 폰을 꺼냈을 때. 상남동 카페 근처 80m. 잠금화면 위에 Live Activity 카드가 올라와 있다.',
  },
  {
    id: 'dynamic-island',
    group: '🔒 감지 & 알림',
    label: 'Dynamic Island',
    hint: '포그라운드 사용 중',
    desc: '민지가 메신저를 쓰고 있을 때 반경에 진입. Dynamic Island가 알림을 전달한다.',
  },
  {
    id: 'widget',
    group: '🔒 감지 & 알림',
    label: '홈스크린 위젯',
    hint: '상시 표시',
    desc: '홈스크린에서 쿠폰 지갑을 한눈에. 큰/작은 위젯 두 가지.',
  },
  {
    id: 'map',
    group: '🗺 메인 앱',
    label: '지도 — 진입 감지',
    hint: '앱 진입 시 기본 화면',
    desc: '지도 중심에 유저 위치, 반경 링 위에 쿠폰이 있는 매장 핀들. 밖에 있는 핀은 회색 처리.',
  },
  {
    id: 'wallet',
    group: '🗺 메인 앱',
    label: '내 쿠폰함 (지갑)',
    hint: '근처 / 전체 탭',
    desc: '근처 쿠폰과 전체 쿠폰을 탭으로 분리. 만료 임박 쿠폰은 D-day 빨간 뱃지.',
  },
  {
    id: 'coupon-detail',
    group: '🗺 메인 앱',
    label: '쿠폰 상세',
    hint: '사용법 · 매장 정보',
    desc: '브랜드 컬러 헤더 + 유효기간 + 사용 단계 + 매장 정보.',
  },
  {
    id: 'coupon-qr',
    group: '🗺 메인 앱',
    label: '쿠폰 사용 (QR)',
    hint: '매장에서 제시',
    desc: 'QR 제시 화면. 화면 밝기 자동 최대. 30초 서명 만료.',
  },
  {
    id: 'coupon-done',
    group: '🗺 메인 앱',
    label: '사용 완료',
    hint: '축하 피드백',
    desc: '오렌지 풀스크린 + 체크 애니메이션.',
  },
  {
    id: 'onboarding',
    group: '⚙️ 설정 & 첫 경험',
    label: '온보딩 (권한)',
    hint: '첫 설치 시',
    desc: '위치/알림 권한을 왜 요청하는지 납득시키는 3단 스텝.',
  },
  {
    id: 'settings',
    group: '⚙️ 설정 & 첫 경험',
    label: '알림 설정',
    hint: '반경 · 토글',
    desc: '감지 반경 슬라이더, Live Activity·위젯 on/off.',
  },
];

// Tweakable defaults
const TWEAKS = /*EDITMODE-BEGIN*/{
  "radius": 200,
  "showLiveActivity": true,
  "showWidget": true,
  "timeOfDay": "afternoon",
  "onboardingStep": 0
}/*EDITMODE-END*/;

// ─────────── App ───────────
function App() {
  const [sceneId, setSceneId] = useState(() => localStorage.getItem('spec01_scene') || 'lockscreen');
  const [tweaksOn, setTweaksOn] = useState(true);
  const [tweaks, setTweaks] = useState(TWEAKS);
  const [pillExpanded, setPillExpanded] = useState(false);
  const [onboardingStep, setOnboardingStep] = useState(0);
  const [walletCouponId, setWalletCouponId] = useState('wc1');

  // persist scene
  useEffect(() => { localStorage.setItem('spec01_scene', sceneId); }, [sceneId]);

  // Tweaks host contract
  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOn(true);
      else if (e.data?.type === '__deactivate_edit_mode') setTweaksOn(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const setTweak = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
  };

  const scene = SCENES.find(s => s.id === sceneId);

  // Group scenes for sidebar
  const groups = useMemo(() => {
    const map = {};
    SCENES.forEach(s => { (map[s.group] = map[s.group] || []).push(s); });
    return map;
  }, []);

  const scenarios = [
    { label: '☕ 카페 근처 (80m) 진입', action: () => { setSceneId('lockscreen'); setPillExpanded(false); } },
    { label: '🍔 버거집 160m — 반경 조정', action: () => { setSceneId('map'); setTweak('radius', 200); } },
    { label: '📍 아무 핀 탭 → 상세', action: () => { setSceneId('coupon-detail'); setWalletCouponId('wc1'); } },
    { label: '🎯 QR 사용 플로우', action: () => { setSceneId('coupon-qr'); setWalletCouponId('wc1'); } },
    { label: '🌱 신규 유저 온보딩', action: () => { setSceneId('onboarding'); setOnboardingStep(0); } },
  ];

  return (
    <div className={`ws ${tweaksOn ? '' : 'tweaks-off'}`}>
      {/* ═══ LEFT SIDEBAR ═══ */}
      <aside className="ws-sidebar">
        <div className="sb-header">
          <div className="sb-brand">🎟 언니픽 · Spec 01</div>
          <div className="sb-sub">지갑 자동 발견</div>
        </div>

        <div className="sb-note">
          민지가 상남동을 걷고 있어요. 휴대폰을 꺼내지 않아도, 걸어 지나가는 가게마다 저장해둔 쿠폰이 <b>자동으로 나타나요</b>.
        </div>

        {Object.entries(groups).map(([g, items]) => (
          <React.Fragment key={g}>
            <div className="sb-section">{g}</div>
            {items.map(s => (
              <button key={s.id}
                className={'sb-item ' + (s.id === sceneId ? 'active' : '')}
                onClick={() => setSceneId(s.id)}>
                <span className="sb-dot"/>
                <span className="sb-label">{s.label}</span>
                <span className="sb-hint">{s.hint}</span>
              </button>
            ))}
          </React.Fragment>
        ))}

        <div className="sim-title">시나리오 빠른 실행</div>
        {scenarios.map((sc, i) => (
          <button key={i} className="sim-btn" onClick={sc.action}>{sc.label}</button>
        ))}

        <div style={{ height: 30 }}/>
      </aside>

      {/* ═══ STAGE ═══ */}
      <main className="ws-stage">
        <div className="screen-label">
          <span className="ix">{SCENES.findIndex(s => s.id === sceneId) + 1}/{SCENES.length}</span>
          {scene.label}
        </div>

        <Stage scene={scene} tweaks={tweaks}
          pillExpanded={pillExpanded} setPillExpanded={setPillExpanded}
          onboardingStep={onboardingStep} setOnboardingStep={setOnboardingStep}
          walletCouponId={walletCouponId} setWalletCouponId={setWalletCouponId}
          goto={setSceneId}/>
      </main>

      {/* ═══ RIGHT SIDEBAR — TWEAKS ═══ */}
      {tweaksOn && (
        <aside className="ws-sidebar right">
          <div className="tw-header">
            <div className="tw-title">Tweaks</div>
            <div className="tw-sub">파라미터를 조정해 다양한 상태를 확인</div>
          </div>

          <div className="tw-group">
            <div className="tw-group-title">이 장면 설명</div>
            <div style={{ font: '500 12px/1.55 var(--font-sans)', color: 'rgba(255,255,255,0.7)' }}>
              {scene.desc}
            </div>
          </div>

          <div className="tw-group">
            <div className="tw-group-title">감지 반경</div>
            <div className="tw-row">
              <span className="tw-label">반경 (m)</span>
              <span className="tw-value">{tweaks.radius}m</span>
            </div>
            <input type="range" min="50" max="500" step="25" value={tweaks.radius}
              onChange={e => setTweak('radius', parseInt(e.target.value))} className="tw-slider"/>
            <div className="tw-desc" style={{ marginTop: 8 }}>
              이 거리 안에 매장이 들어오면 Live Activity·위젯·지도가 반응합니다.
            </div>
          </div>

          <div className="tw-group">
            <div className="tw-group-title">알림 출력</div>
            <div className="tw-row">
              <div>
                <div className="tw-label">Live Activity</div>
                <div className="tw-desc">잠금화면 + Dynamic Island</div>
              </div>
              <button className={'tw-switch ' + (tweaks.showLiveActivity ? 'on' : '')}
                onClick={() => setTweak('showLiveActivity', !tweaks.showLiveActivity)}/>
            </div>
            <div className="tw-row">
              <div>
                <div className="tw-label">홈 위젯</div>
                <div className="tw-desc">iOS 홈스크린 위젯</div>
              </div>
              <button className={'tw-switch ' + (tweaks.showWidget ? 'on' : '')}
                onClick={() => setTweak('showWidget', !tweaks.showWidget)}/>
            </div>
          </div>

          <div className="tw-group">
            <div className="tw-group-title">시간대 (배경)</div>
            <div className="tw-seg">
              {['morning','afternoon','evening','night'].map(t => (
                <button key={t} onClick={() => setTweak('timeOfDay', t)}
                  className={'tw-seg-btn ' + (tweaks.timeOfDay === t ? 'on' : '')}>
                  {t === 'morning' ? '아침' : t === 'afternoon' ? '낮' : t === 'evening' ? '저녁' : '밤'}
                </button>
              ))}
            </div>
          </div>

          {sceneId === 'onboarding' && (
            <div className="tw-group">
              <div className="tw-group-title">온보딩 스텝</div>
              <div className="tw-seg">
                {[0,1,2].map(i => (
                  <button key={i} onClick={() => setOnboardingStep(i)}
                    className={'tw-seg-btn ' + (onboardingStep === i ? 'on' : '')}>
                    {i + 1}단계
                  </button>
                ))}
              </div>
            </div>
          )}

          {(sceneId === 'coupon-detail' || sceneId === 'coupon-qr' || sceneId === 'coupon-done') && (
            <div className="tw-group">
              <div className="tw-group-title">쿠폰 선택</div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 6, marginTop: 4 }}>
                {WALLET.filter(c => c.isNearby).slice(0, 4).map(c => {
                  const st = findStore(c.storeId);
                  return (
                    <button key={c.id} onClick={() => setWalletCouponId(c.id)} style={{
                      display: 'flex', gap: 10, alignItems: 'center',
                      padding: '8px 10px', borderRadius: 8,
                      background: walletCouponId === c.id ? 'rgba(255,111,15,0.15)' : 'rgba(255,255,255,0.04)',
                      border: '1px solid ' + (walletCouponId === c.id ? 'rgba(255,111,15,0.4)' : 'transparent'),
                      color: '#fff', cursor: 'pointer', textAlign: 'left',
                    }}>
                      <span style={{ fontSize: 16 }}>{st.emoji}</span>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ font: '700 11px/1.2 var(--font-sans)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                          {c.title}
                        </div>
                        <div style={{ font: '500 10px/1 var(--font-sans)', color: 'rgba(255,255,255,0.5)', marginTop: 2 }}>
                          {st.name} · D-{c.daysLeft}
                        </div>
                      </div>
                    </button>
                  );
                })}
              </div>
            </div>
          )}

          <div style={{ height: 30 }}/>
        </aside>
      )}
    </div>
  );
}

// ─────────── Stage: renders the device for current scene ───────────
function Stage({ scene, tweaks, pillExpanded, setPillExpanded, onboardingStep, setOnboardingStep, walletCouponId, setWalletCouponId, goto }) {
  const renderContent = () => {
    switch (scene.id) {
      case 'lockscreen':
        return <LockSceneView tweaks={tweaks}/>;
      case 'dynamic-island':
        return <DynamicIslandView tweaks={tweaks} pillExpanded={pillExpanded} setPillExpanded={setPillExpanded}/>;
      case 'widget':
        return <WidgetView tweaks={tweaks}/>;
      case 'map':
        return <IOSDevice width={402} height={874}>
          <MapScreen radius={tweaks.radius}
            onTapStore={(sid) => {
              const coup = walletByStore(sid)[0];
              if (coup) { setWalletCouponId(coup.id); goto('coupon-detail'); }
            }}
            onOpenWallet={() => goto('wallet')}
            onOpenSettings={() => goto('settings')}/>
        </IOSDevice>;
      case 'wallet':
        return <IOSDevice width={402} height={874}>
          <WalletScreen onBack={() => goto('map')}
            onOpenCoupon={(cid) => { setWalletCouponId(cid); goto('coupon-detail'); }}/>
        </IOSDevice>;
      case 'coupon-detail':
        return <IOSDevice width={402} height={874}>
          <CouponDetail couponId={walletCouponId}
            onBack={() => goto('wallet')}
            onUsed={() => goto('wallet')}/>
        </IOSDevice>;
      case 'coupon-qr':
        return <IOSDevice width={402} height={874}>
          <CouponQRView couponId={walletCouponId} goto={goto}/>
        </IOSDevice>;
      case 'coupon-done':
        return <IOSDevice width={402} height={874}>
          <CouponDoneView couponId={walletCouponId} goto={goto}/>
        </IOSDevice>;
      case 'onboarding':
        return <IOSDevice width={402} height={874}>
          <Onboarding step={onboardingStep}
            onNext={() => {
              if (onboardingStep < 2) setOnboardingStep(onboardingStep + 1);
              else goto('map');
            }}/>
        </IOSDevice>;
      case 'settings':
        return <IOSDevice width={402} height={874}>
          <SettingsScreen onBack={() => goto('map')}
            radius={tweaks.radius} setRadius={(v) => window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { radius: v } }, '*')}
            liveActivity={tweaks.showLiveActivity} setLiveActivity={() => {}}
            widget={tweaks.showWidget} setWidget={() => {}}
            onReplay={() => goto('onboarding')}/>
        </IOSDevice>;
      default:
        return null;
    }
  };

  return <div style={{ padding: '80px 40px 40px' }}>{renderContent()}</div>;
}

// ─────────── Individual views ───────────
function LockSceneView({ tweaks }) {
  return (
    <IOSDevice width={402} height={874}>
      <LockScreenBg>
        {/* Time + date */}
        <div style={{ padding: '72px 0 0', textAlign: 'center', color: '#fff' }}>
          <div style={{ font: '500 20px/1 var(--font-sans)', opacity: 0.9, marginBottom: 6, letterSpacing: '-0.3px' }}>
            {tweaks.timeOfDay === 'morning' ? '월요일, 4월 20일' :
             tweaks.timeOfDay === 'afternoon' ? '월요일, 4월 20일' :
             tweaks.timeOfDay === 'evening' ? '월요일, 4월 20일' : '월요일, 4월 20일'}
          </div>
          <div style={{ font: '200 86px/1 var(--font-sans)', letterSpacing: '-4px' }}>
            {tweaks.timeOfDay === 'morning' ? '9:24' :
             tweaks.timeOfDay === 'afternoon' ? '14:08' :
             tweaks.timeOfDay === 'evening' ? '18:42' : '22:15'}
          </div>
        </div>

        {/* Live Activity area */}
        <div style={{ position: 'absolute', left: 16, right: 16, bottom: 110 }}>
          {tweaks.showLiveActivity && (
            <LiveActivityCard expanded={true}/>
          )}
        </div>

        {/* Flashlight + camera */}
        <div style={{
          position: 'absolute', bottom: 38, left: 0, right: 0,
          display: 'flex', justifyContent: 'space-between',
          padding: '0 32px',
        }}>
          {['🔦', '📷'].map((e, i) => (
            <div key={i} style={{
              width: 50, height: 50, borderRadius: 25,
              background: 'rgba(0,0,0,0.35)',
              backdropFilter: 'blur(16px)',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontSize: 20,
            }}>{e}</div>
          ))}
        </div>
      </LockScreenBg>
    </IOSDevice>
  );
}

function DynamicIslandView({ tweaks, pillExpanded, setPillExpanded }) {
  return (
    <div style={{ position: 'relative' }}>
      <IOSDevice width={402} height={874}>
        {/* Fake messaging app behind */}
        <div style={{ height: '100%', background: '#fff', padding: '60px 0 0' }}>
          <div style={{ padding: '0 16px', borderBottom: '1px solid var(--gray-200)', paddingBottom: 12 }}>
            <div style={{ font: '900 28px/1 var(--font-sans)', color: 'var(--gray-900)', letterSpacing: '-0.8px' }}>
              메시지
            </div>
          </div>
          {[
            { name: '소영 ✨', msg: '상남 맛집 알려줘!', time: '오후 6:40', unread: true },
            { name: '엄마', msg: '저녁 먹고 가?', time: '오후 6:32' },
            { name: '민수', msg: '내일 오전에 봐요', time: '오후 6:21' },
            { name: '수민', msg: '좋아 좋아', time: '오후 5:58' },
            { name: '주현 언니', msg: '그 카페 어땠어?', time: '오후 5:44' },
          ].map((m, i) => (
            <div key={i} style={{
              display: 'flex', gap: 12, padding: '14px 16px',
              borderBottom: '1px solid var(--gray-100)',
            }}>
              <div style={{
                width: 46, height: 46, borderRadius: 23,
                background: `hsl(${i * 60}, 65%, 75%)`,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                font: '800 16px/1 var(--font-sans)', color: '#fff',
              }}>{m.name[0]}</div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                  <div style={{ font: '700 15px/1.2 var(--font-sans)', color: 'var(--gray-900)' }}>{m.name}</div>
                  <div style={{ font: '500 11px/1 var(--font-sans)', color: 'var(--gray-500)' }}>{m.time}</div>
                </div>
                <div style={{ font: '500 13px/1.4 var(--font-sans)', color: m.unread ? 'var(--gray-900)' : 'var(--gray-500)', marginTop: 4 }}>
                  {m.msg}
                </div>
              </div>
              {m.unread && <div style={{ width: 10, height: 10, borderRadius: 5, background: 'var(--orange-500)', marginTop: 8 }}/>}
            </div>
          ))}
        </div>
      </IOSDevice>
      {/* Pill or expanded */}
      {tweaks.showLiveActivity && (
        pillExpanded
          ? <div onClick={() => setPillExpanded(false)}>
              <DynamicIslandExpanded visible={true}/>
            </div>
          : <DynamicIslandPill onTap={() => setPillExpanded(true)}/>
      )}
      <div style={{
        position: 'absolute', bottom: -40, left: 0, right: 0,
        textAlign: 'center', font: '600 12px/1.5 var(--font-sans)', color: 'var(--gray-600)',
      }}>
        💡 Dynamic Island를 탭해서 펼치기 / 접기
      </div>
    </div>
  );
}

function WidgetView({ tweaks }) {
  return (
    <IOSDevice width={402} height={874}>
      <HomeScreenBg>
        <div style={{ color: '#fff', textAlign: 'center', font: '700 14px/1 var(--font-sans)', opacity: 0.7, marginBottom: 20, letterSpacing: '-0.1px' }}>
          오후 6:42
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 20 }}>
          {tweaks.showWidget && <HomeWidget size="medium"/>}
          <div style={{ display: 'flex', gap: 20 }}>
            {tweaks.showWidget && <HomeWidget size="small"/>}
            <div style={{
              width: 170, height: 170, borderRadius: 22,
              background: 'rgba(255,255,255,0.12)',
              backdropFilter: 'blur(10px)',
              padding: 16, color: '#fff',
              display: 'flex', flexDirection: 'column', justifyContent: 'flex-end',
            }}>
              <div style={{ fontSize: 30, marginBottom: 6 }}>🌤</div>
              <div style={{ font: '900 28px/1 var(--font-sans)' }}>18°</div>
              <div style={{ font: '600 11px/1 var(--font-sans)', opacity: 0.8, marginTop: 4 }}>
                창원시 · 맑음
              </div>
            </div>
          </div>
        </div>
      </HomeScreenBg>
    </IOSDevice>
  );
}

function CouponQRView({ couponId, goto }) {
  const coupon = WALLET.find(c => c.id === couponId);
  const store = findStore(coupon.storeId);
  return (
    <div style={{ height: '100%', background: '#fff', display: 'flex', flexDirection: 'column' }}>
      <div style={{ padding: '54px 20px 10px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <button onClick={() => goto('coupon-detail')} style={{ background: 'none', border: 'none', cursor: 'pointer' }}>
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><path d="M18 7l-7 7 7 7" stroke="#191F28" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </button>
        <div style={{ font: '800 16px/1 var(--font-sans)', color: 'var(--gray-900)' }}>사장님께 보여주세요</div>
        <div style={{ width: 28 }}/>
      </div>
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: 20 }}>
        <div style={{ font: '800 20px/1.2 var(--font-sans)', color: 'var(--gray-900)', textAlign: 'center', letterSpacing: '-0.4px', marginBottom: 6 }}>
          {coupon.title}
        </div>
        <div style={{ font: '500 13px/1 var(--font-sans)', color: 'var(--gray-500)', marginBottom: 28 }}>
          {store.name}
        </div>
        <div style={{ width: 240, height: 240, background: '#fff', borderRadius: 16, border: '8px solid #191F28', display: 'grid', gridTemplateColumns: 'repeat(21, 1fr)', padding: 8 }}>
          {Array.from({ length: 441 }).map((_, i) => {
            const r = Math.floor(i / 21), c = i % 21;
            const innerCorner = (r >= 2 && r <= 4 && (c >= 2 && c <= 4 || c >= 16 && c <= 18)) || (r >= 16 && r <= 18 && c >= 2 && c <= 4);
            const outerCorner = ((r === 0 || r === 6) && c < 7) || ((c === 0 || c === 6) && r < 7) ||
              ((r === 0 || r === 6) && c > 13) || ((c === 14 || c === 20) && r < 7) ||
              ((r === 14 || r === 20) && c < 7) || ((c === 0 || c === 6) && r > 13);
            const corner = (r < 7 && c < 7) || (r < 7 && c > 13) || (r > 13 && c < 7);
            const filled = innerCorner || outerCorner || (!corner && ((r * 13 + c * 7 + couponId.length) % 3 === 0));
            return <div key={i} style={{ background: filled ? '#191F28' : 'transparent' }}/>;
          })}
        </div>
        <div style={{
          marginTop: 28, padding: '12px 18px', background: 'var(--orange-50)',
          borderRadius: 12, font: '700 13px/1.4 var(--font-sans)', color: 'var(--orange-700)',
          textAlign: 'center',
        }}>
          화면 밝기 자동 최대 · 30초 후 코드 갱신
        </div>
        <button onClick={() => goto('coupon-done')} style={{
          marginTop: 32, background: 'var(--gray-900)', color: '#fff',
          border: 'none', padding: '14px 40px', borderRadius: 14,
          font: '700 14px/1 var(--font-sans)', cursor: 'pointer',
        }}>사용 완료 처리 (데모)</button>
      </div>
    </div>
  );
}
