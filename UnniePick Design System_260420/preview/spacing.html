<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:22px;background:#fff;font-family:var(--font-sans);color:var(--fg1)}
.row{display:flex;gap:4px;align-items:flex-end;margin-bottom:12px}
.b{background:var(--orange-500);border-radius:4px}
.lab{font:700 10px/1.1 var(--font-sans);color:var(--fg3);margin-top:6px;text-align:center}
.col{display:flex;flex-direction:column;align-items:center;margin-right:4px}
</style></head><body>
<div style="font:800 12px/1 var(--font-sans);color:var(--fg2);margin-bottom:10px;letter-spacing:0.4px;text-transform:uppercase">Spacing · 4px base</div>
<div class="row">
<div class="col"><div class="b" style="width:2px;height:2px"></div><div class="lab">xxs<br>2</div></div>
<div class="col"><div class="b" style="width:4px;height:4px"></div><div class="lab">xs<br>4</div></div>
<div class="col"><div class="b" style="width:8px;height:8px"></div><div class="lab">sm<br>8</div></div>
<div class="col"><div class="b" style="width:12px;height:12px"></div><div class="lab">md<br>12</div></div>
<div class="col"><div class="b" style="width:16px;height:16px"></div><div class="lab">lg<br>16</div></div>
<div class="col"><div class="b" style="width:20px;height:20px"></div><div class="lab">xl<br>20</div></div>
<div class="col"><div class="b" style="width:24px;height:24px"></div><div class="lab">xxl<br>24</div></div>
<div class="col"><div class="b" style="width:32px;height:32px"></div><div class="lab">3xl<br>32</div></div>
<div class="col"><div class="b" style="width:40px;height:40px"></div><div class="lab">4xl<br>40</div></div>
<div class="col"><div class="b" style="width:48px;height:48px"></div><div class="lab">5xl<br>48</div></div>
</div>
</body></html>
