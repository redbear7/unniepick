<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:22px;background:var(--gray-100);font-family:var(--font-sans);color:var(--fg1)}
.w{background:#fff;border-radius:16px;overflow:hidden;box-shadow:var(--shadow-sm);max-width:340px}
.top{background:linear-gradient(135deg,#FF6F0F,#FF9A3D);padding:16px;color:#fff}
.s{font:700 11px/1 var(--font-sans);opacity:0.85;margin-bottom:4px}
.t{font:900 16px/1.2 var(--font-sans);margin-bottom:8px;letter-spacing:-0.3px}
.e{font:400 10px/1 var(--font-sans);opacity:0.8}
.b{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.bar{flex:1}
.bl{font:500 10px/1 var(--font-sans);color:var(--fg3);margin-bottom:4px;display:flex;justify-content:space-between}
.bw{height:5px;background:var(--gray-150);border-radius:3px;overflow:hidden}
.bf{width:80%;height:100%;background:var(--orange-500);border-radius:3px}
.use{background:var(--orange-500);color:#fff;padding:8px 14px;border-radius:20px;font:800 12px/1 var(--font-sans);border:none;white-space:nowrap}
</style></head><body>
<div class="w">
<div class="top">
<div class="s">카페봄날</div>
<div class="t">아메리카노 1+1</div>
<div class="e">~2026년 4월 25일 만료</div>
</div>
<div class="b">
<div class="bar"><div class="bl"><span>D-2</span><span>80%</span></div><div class="bw"><div class="bf"></div></div></div>
<button class="use">쿠폰 사용하기</button>
</div>
</div>
</body></html>
