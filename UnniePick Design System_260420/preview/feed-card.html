<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:16px;background:var(--gray-100);font-family:var(--font-sans);color:var(--fg1)}
.card{background:#fff;padding:16px 16px 0;border-bottom:1px solid var(--gray-200);max-width:360px}
.head{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.av{width:52px;height:52px;border-radius:14px;background:#FF6F0F;color:#fff;display:flex;align-items:center;justify-content:center;font:900 22px/1 var(--font-sans)}
.info{flex:1}
.name{font:800 16px/1.2 var(--font-sans);letter-spacing:-0.3px}
.meta{font:400 13px/1.2 var(--font-sans);color:var(--fg3);margin-top:3px}
.follow{padding:7px 14px;border-radius:20px;border:1.5px solid var(--orange-500);background:var(--orange-500);color:#fff;font:700 13px/1 var(--font-sans)}
.cap{font:500 14px/20px var(--font-sans);color:var(--fg2);margin-bottom:6px}
.coupon{background:var(--orange-50);border:1.5px dashed var(--orange-500);border-radius:14px;padding:14px;margin-top:10px}
.ct{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ct-t{flex:1;font:800 17px/1 var(--font-sans);letter-spacing:-0.4px}
.ct-b{background:var(--orange-500);color:#fff;border-radius:20px;padding:4px 10px;font:800 11px/1 var(--font-sans)}
.foot{display:flex;justify-content:space-between;align-items:center}
.e{font:500 13px/1 var(--font-sans);color:var(--fg3)}
.get{background:var(--orange-500);color:#fff;padding:9px 20px;border-radius:22px;font:800 14px/1 var(--font-sans);border:none}
.actions{display:flex;gap:16px;padding:12px 0;margin-top:10px;border-top:1px solid var(--gray-100)}
.a{font:500 13px/1 var(--font-sans);color:var(--fg3)}
</style></head><body>
<div class="card">
<div class="head">
<div class="av">카</div>
<div class="info"><div class="name">카페봄날</div><div class="meta">☕ 카페 · 방금</div></div>
<button class="follow">팔로잉</button>
</div>
<div class="cap">⚡ 오늘 오후 2-5시 아메리카노 1+1 쿠폰 발급 중!</div>
<div class="coupon">
<div class="ct"><div class="ct-t">아메리카노 1+1</div><div class="ct-b">NEW</div></div>
<div class="foot"><div class="e">📅 D-0 · 🔥 잔여 12장</div><button class="get">쿠폰받기</button></div>
</div>
<div class="actions"><span class="a">🎫 쿠폰 1개</span><span class="a">❤️ 47</span><span class="a">💬 12</span></div>
</div>
</body></html>
