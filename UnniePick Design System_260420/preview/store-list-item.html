<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:16px;background:#fff;font-family:var(--font-sans);color:var(--fg1)}
.row{display:flex;align-items:center;gap:14px;padding:14px 16px;max-width:360px}
.thumb{width:80px;height:80px;border-radius:16px;background:#FFF0E6;display:flex;align-items:center;justify-content:center;font-size:34px}
.body{flex:1;min-width:0}
.name{font:700 18px/1.2 var(--font-sans);letter-spacing:-0.3px}
.meta{font:400 13px/1.2 var(--font-sans);color:var(--fg3);margin-top:4px}
.stats{display:flex;gap:8px;margin-top:6px;align-items:center}
.chip{background:#FFEAEA;color:#E53935;padding:4px 9px;border-radius:8px;font:700 12px/1 var(--font-sans)}
.fol{font:400 13px/1 var(--font-sans);color:var(--fg3)}
.fbtn{padding:8px 16px;border-radius:20px;border:1.5px solid var(--orange-500);background:var(--orange-500);color:#fff;font:700 13px/1 var(--font-sans)}
</style></head><body>
<div class="row">
<div class="thumb">☕</div>
<div class="body">
<div class="name">카페봄날</div>
<div class="meta">카페 · 📍 120m</div>
<div class="stats"><span class="chip">🎟 쿠폰 3개</span><span class="fol">팔로워 1,230</span></div>
</div>
<button class="fbtn">팔로잉</button>
</div>
</body></html>
