<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:22px;background:var(--gray-100);font-family:var(--font-sans);color:var(--fg1)}
.coupon{background:var(--orange-50);border:1.5px dashed var(--orange-500);border-radius:14px;padding:14px;max-width:360px}
.top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.title{flex:1;font:800 17px/1 var(--font-sans);letter-spacing:-0.4px}
.badge{background:var(--orange-500);color:#fff;border-radius:20px;padding:4px 10px;font:800 11px/1 var(--font-sans);letter-spacing:0.3px}
.desc{font:400 13px/18px var(--font-sans);color:var(--fg2);margin-bottom:8px}
.foot{display:flex;align-items:center;justify-content:space-between}
.meta{font:500 13px/1 var(--font-sans);color:var(--fg3)}
.urgent{color:var(--orange-500);font-weight:700}
.get{background:var(--orange-500);color:#fff;padding:9px 20px;border-radius:22px;font:800 14px/1 var(--font-sans);border:none}
</style></head><body>
<div class="coupon">
<div class="top"><div class="title">아메리카노 1+1</div><div class="badge">오늘만</div></div>
<div class="desc">오늘 오후 2-5시 발급 중</div>
<div class="foot"><div><span class="meta">⏰ 오늘 마감</span> &nbsp;<span class="meta urgent">🔥 잔여 10장</span></div><button class="get">쿠폰받기</button></div>
</div>
</body></html>
