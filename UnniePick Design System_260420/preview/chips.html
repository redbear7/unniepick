<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:22px;background:#fff;font-family:var(--font-sans);color:var(--fg1)}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.chip{padding:5px 14px;border-radius:20px;font:700 12px/1 var(--font-sans);background:var(--gray-100);color:var(--gray-700);white-space:nowrap}
.chip.on{background:var(--orange-500);color:#fff}
.badge{display:inline-block;padding:3px 9px;border-radius:10px;font:800 10px/1 var(--font-sans);letter-spacing:0.3px}
.new{background:var(--orange-500);color:#fff}
.hot{background:var(--red-500);color:#fff}
.end{background:var(--gray-700);color:#fff}
.ad{background:rgba(0,0,0,0.18);color:#fff;border-radius:6px}
.coupon{background:var(--orange-50);color:var(--orange-500);padding:3px 10px;border-radius:20px;font:700 11px/1 var(--font-sans)}
.remain{background:#FFEAEA;color:#E53935;padding:4px 9px;border-radius:8px;font:700 12px/1 var(--font-sans)}
</style></head><body>
<div class="row">
<span class="chip on">전체</span><span class="chip">카페</span><span class="chip">음식</span><span class="chip">미용</span><span class="chip">네일</span><span class="chip">기타</span>
</div>
<div class="row">
<span class="badge new">NEW</span>
<span class="badge hot">오늘만</span>
<span class="badge end">인기</span>
<span class="badge ad">AD</span>
<span class="coupon">🎟 쿠폰 3개</span>
<span class="remain">🔥 잔여 10장</span>
</div>
</body></html>
