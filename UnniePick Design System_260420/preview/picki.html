<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:22px;background:#fff;font-family:var(--font-sans);color:var(--fg1);display:flex;gap:32px;align-items:center;flex-wrap:wrap}
.p{display:flex;flex-direction:column;align-items:center;gap:8px}
.em{font-size:56px;line-height:1}
.bub{background:#FFF0E6;border:1.5px solid #FFD93D;border-radius:20px;padding:6px 14px;font:600 13px/1.3 var(--font-sans);color:var(--fg1)}
.lab{font:500 10px/1 var(--font-sans);color:var(--fg3);margin-top:2px}
</style></head><body>
<div class="p"><div class="em">🐻</div><div class="bub">오늘도 맛있겠다!</div><div class="lab">happy</div></div>
<div class="p"><div class="em">🐻‍❄️</div><div class="bub">새 쿠폰이 왔어요!</div><div class="lab">excited</div></div>
<div class="p"><div class="em">🎉</div><div class="bub">스탬프 완성! 축하해요!</div><div class="lab">celebrate</div></div>
</body></html>
