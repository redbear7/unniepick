<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:22px;background:#fff;font-family:var(--font-sans);color:var(--fg1)}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.btn{padding:13px 22px;border-radius:22px;font:800 14px/1 var(--font-sans);letter-spacing:-0.2px;border:none;cursor:pointer}
.primary{background:var(--orange-500);color:#fff;box-shadow:var(--shadow-brand)}
.ghost{background:#fff;color:var(--orange-500);border:1.5px solid var(--orange-500)}
.filled{background:var(--orange-50);color:var(--orange-500)}
.dark{background:var(--gray-900);color:#fff}
.disabled{background:var(--gray-200);color:var(--gray-500)}
.small{padding:8px 16px;border-radius:20px;font:700 12px/1 var(--font-sans)}
.full{display:block;width:100%;padding:14px;border-radius:12px;text-align:center}
</style></head><body>
<div class="row">
<button class="btn primary">쿠폰 받기</button>
<button class="btn primary small">+ 팔로우</button>
<button class="btn ghost small">팔로우</button>
<button class="btn filled small">🎟 쿠폰 3개</button>
<button class="btn disabled small">저장됨</button>
</div>
<div class="row">
<button class="btn dark">팔로워에게 즉시 알림 🔔</button>
<button class="btn primary full">⚡ 쿠폰 발행하기</button>
</div>
</body></html>
