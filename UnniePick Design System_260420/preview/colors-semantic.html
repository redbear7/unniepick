<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans)}
.row{display:flex;gap:10px;flex-wrap:wrap}
.sw{width:96px;text-align:center}
.chip{width:96px;height:60px;border-radius:12px;display:flex;align-items:center;justify-content:center;font:800 13px/1 var(--font-sans);color:#fff}
.hex{font:700 11px/1.2 var(--font-sans);color:var(--fg2);margin-top:6px}
.nm{font:500 10px/1.2 var(--font-sans);color:var(--fg3);margin-top:2px}
h4{margin:0 0 10px;font:800 13px/1 var(--font-sans);letter-spacing:-0.2px;color:var(--fg1)}
</style></head><body>
<h4>Semantic</h4>
<div class="row">
<div class="sw"><div class="chip" style="background:#0AC86E">✓</div><div class="hex">#0AC86E</div><div class="nm">success</div></div>
<div class="sw"><div class="chip" style="background:#E53935">⏰</div><div class="hex">#E53935</div><div class="nm">danger · expiry</div></div>
<div class="sw"><div class="chip" style="background:#FEE500;color:#191F28">KAKAO</div><div class="hex">#FEE500</div><div class="nm">warning · kakao</div></div>
<div class="sw"><div class="chip" style="background:#1A73E8">i</div><div class="hex">#1A73E8</div><div class="nm">info</div></div>
<div class="sw"><div class="chip" style="background:#2DB87A">📍</div><div class="hex">#2DB87A</div><div class="nm">distance</div></div>
<div class="sw"><div class="chip" style="background:#D4700A">🔥</div><div class="hex">#D4700A</div><div class="nm">amber · hot</div></div>
</div>
</body></html>
