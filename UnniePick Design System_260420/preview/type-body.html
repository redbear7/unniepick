<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:22px;background:#fff;font-family:var(--font-sans);color:var(--fg1)}
.row{display:flex;align-items:center;gap:16px;margin-bottom:10px}
.label{font:700 10px/1 var(--font-sans);color:var(--fg3);letter-spacing:0.5px;text-transform:uppercase;width:72px;flex-shrink:0}
.chip{display:inline-flex;padding:4px 10px;border-radius:999px;background:var(--orange-500);color:#fff}
</style></head><body>
<div class="row"><div class="label">l1 · 13 / 600</div><div class="t-l1">쿠폰 받기</div></div>
<div class="row"><div class="label">l2 · 12 / 600</div><div class="t-l2">+ 팔로우</div></div>
<div class="row"><div class="label">l3 · 11 / 700</div><span class="chip t-l3">NEW</span><span class="chip t-l3" style="background:var(--red-500)">HOT</span><span class="chip t-l3" style="background:var(--gray-700)">AD</span></div>
<div class="row"><div class="label">c1 · 11 / 400</div><div class="t-c1">📅 D-2 · 잔여 10장</div></div>
<div class="row"><div class="label">c2 · 10 / 500</div><div class="t-c2">최대 5,000원 할인 · 1인 1매</div></div>
</body></html>
