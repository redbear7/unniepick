<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans)}
.row{display:flex;gap:10px;flex-wrap:wrap}
.sw{width:88px;text-align:center}
.chip{width:88px;height:64px;border-radius:12px;box-shadow:inset 0 0 0 1px rgba(0,0,0,0.04)}
.hex{font:700 11px/1.2 var(--font-sans);color:var(--fg2);margin-top:6px;letter-spacing:-0.1px}
.nm{font:500 10px/1.2 var(--font-sans);color:var(--fg3);margin-top:2px}
h4{margin:0 0 10px;font:800 13px/1 var(--font-sans);letter-spacing:-0.2px;color:var(--fg1)}
</style></head><body>
<h4>Brand — Orange</h4>
<div class="row">
<div class="sw"><div class="chip" style="background:#FFF3EB"></div><div class="hex">#FFF3EB</div><div class="nm">orange-50</div></div>
<div class="sw"><div class="chip" style="background:#FFE0C8"></div><div class="hex">#FFE0C8</div><div class="nm">orange-100</div></div>
<div class="sw"><div class="chip" style="background:#FFB07A"></div><div class="hex">#FFB07A</div><div class="nm">orange-300</div></div>
<div class="sw"><div class="chip" style="background:#FF6F0F"></div><div class="hex" style="color:#fff;background:#FF6F0F;border-radius:4px;padding:1px 3px;display:inline-block">#FF6F0F ★</div><div class="nm">orange-500 · primary</div></div>
<div class="sw"><div class="chip" style="background:#E5620D"></div><div class="hex">#E5620D</div><div class="nm">orange-600</div></div>
<div class="sw"><div class="chip" style="background:#CC560B"></div><div class="hex">#CC560B</div><div class="nm">orange-700</div></div>
</div>
</body></html>
