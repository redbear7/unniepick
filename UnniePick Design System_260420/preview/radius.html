<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:22px;background:#fff;font-family:var(--font-sans);color:var(--fg1)}
.row{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap}
.col{display:flex;flex-direction:column;align-items:center}
.b{width:60px;height:60px;background:var(--orange-50);border:1.5px solid var(--orange-500)}
.lab{font:700 10px/1.1 var(--font-sans);color:var(--fg3);margin-top:6px;text-align:center}
</style></head><body>
<div style="font:800 12px/1 var(--font-sans);color:var(--fg2);margin-bottom:12px;letter-spacing:0.4px;text-transform:uppercase">Radius</div>
<div class="row">
<div class="col"><div class="b" style="border-radius:6px"></div><div class="lab">xs · 6</div></div>
<div class="col"><div class="b" style="border-radius:8px"></div><div class="lab">sm · 8</div></div>
<div class="col"><div class="b" style="border-radius:12px"></div><div class="lab">md · 12</div></div>
<div class="col"><div class="b" style="border-radius:16px"></div><div class="lab">lg · 16</div></div>
<div class="col"><div class="b" style="border-radius:20px"></div><div class="lab">xl · 20</div></div>
<div class="col"><div class="b" style="border-radius:24px"></div><div class="lab">xxl · 24</div></div>
<div class="col"><div class="b" style="border-radius:28px"></div><div class="lab">3xl · 28</div></div>
<div class="col"><div class="b" style="border-radius:9999px"></div><div class="lab">full</div></div>
</div>
</body></html>
