<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:22px;background:#fff;font-family:var(--font-sans)}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.badge{display:inline-block;padding:4px 10px;border-radius:10px;font:800 11px/1 var(--font-sans);letter-spacing:0.3px}
.new{background:var(--orange-500);color:#fff}
.hot{background:var(--red-500);color:#fff}
.end{background:var(--gray-700);color:#fff}
.today{background:#E53935;color:#fff}
.pop{background:var(--orange-500);color:#fff}
.ad{background:rgba(0,0,0,0.18);color:#fff;border-radius:6px;letter-spacing:1px}
.used{background:var(--gray-100);color:var(--gray-500)}
.ts{background:#FFF0E6;color:#D4700A}
.kd{background:#E8F5E9;color:#2DB87A}
</style></head><body>
<div class="row">
<span class="badge new">NEW</span>
<span class="badge hot">오늘만</span>
<span class="badge pop">인기</span>
<span class="badge today">D-0</span>
<span class="badge end">마감임박</span>
<span class="badge ad">AD</span>
<span class="badge used">✓ 사용완료</span>
<span class="badge ts">⏰ 타임세일</span>
<span class="badge kd">🎟 할인쿠폰</span>
</div>
</body></html>
