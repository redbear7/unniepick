<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:30px 22px;background:#F9FAFB;font-family:var(--font-sans);color:var(--fg1)}
.row{display:flex;gap:20px;flex-wrap:wrap;align-items:center}
.col{display:flex;flex-direction:column;align-items:center}
.b{width:72px;height:72px;background:#fff;border-radius:14px}
.lab{font:700 10px/1.2 var(--font-sans);color:var(--fg3);margin-top:10px;text-align:center}
</style></head><body>
<div class="row">
<div class="col"><div class="b" style="box-shadow:var(--shadow-xs)"></div><div class="lab">xs</div></div>
<div class="col"><div class="b" style="box-shadow:var(--shadow-sm)"></div><div class="lab">sm · card</div></div>
<div class="col"><div class="b" style="box-shadow:var(--shadow-md)"></div><div class="lab">md</div></div>
<div class="col"><div class="b" style="box-shadow:var(--shadow-lg)"></div><div class="lab">lg</div></div>
<div class="col"><div class="b" style="box-shadow:var(--shadow-xl)"></div><div class="lab">xl</div></div>
<div class="col"><div class="b" style="background:var(--orange-500);box-shadow:var(--shadow-brand)"></div><div class="lab">brand</div></div>
</div>
</body></html>
