<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans)}
.row{display:flex;gap:6px;flex-wrap:wrap}
.sw{width:72px}
.chip{width:72px;height:56px;border-radius:10px;box-shadow:inset 0 0 0 1px rgba(0,0,0,0.05)}
.hex{font:700 10px/1.2 var(--font-sans);color:var(--fg2);margin-top:5px}
.nm{font:500 9px/1.2 var(--font-sans);color:var(--fg3);margin-top:2px}
h4{margin:0 0 10px;font:800 13px/1 var(--font-sans);letter-spacing:-0.2px;color:var(--fg1)}
</style></head><body>
<h4>Neutral — Toss-style gray ramp</h4>
<div class="row">
<div class="sw"><div class="chip" style="background:#F9FAFB"></div><div class="hex">#F9FAFB</div><div class="nm">gray-50</div></div>
<div class="sw"><div class="chip" style="background:#F2F4F6"></div><div class="hex">#F2F4F6</div><div class="nm">gray-100</div></div>
<div class="sw"><div class="chip" style="background:#EAECEF"></div><div class="hex">#EAECEF</div><div class="nm">gray-150</div></div>
<div class="sw"><div class="chip" style="background:#E5E8EB"></div><div class="hex">#E5E8EB</div><div class="nm">gray-200</div></div>
<div class="sw"><div class="chip" style="background:#D1D6DB"></div><div class="hex">#D1D6DB</div><div class="nm">gray-300</div></div>
<div class="sw"><div class="chip" style="background:#ADB5BD"></div><div class="hex">#ADB5BD</div><div class="nm">gray-400</div></div>
<div class="sw"><div class="chip" style="background:#8B95A1"></div><div class="hex">#8B95A1</div><div class="nm">gray-500</div></div>
<div class="sw"><div class="chip" style="background:#6B7684"></div><div class="hex" style="color:#fff">#6B7684</div><div class="nm">gray-600</div></div>
<div class="sw"><div class="chip" style="background:#4E5968"></div><div class="hex" style="color:#fff">#4E5968</div><div class="nm">gray-700</div></div>
<div class="sw"><div class="chip" style="background:#333D4B"></div><div class="hex" style="color:#fff">#333D4B</div><div class="nm">gray-800</div></div>
<div class="sw"><div class="chip" style="background:#191F28"></div><div class="hex" style="color:#fff">#191F28</div><div class="nm">gray-900</div></div>
</div>
</body></html>
